<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Albo d'Oro Fantacalcio</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- ApexCharts CDN -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <style>
    body {
      background: #f8f9fa;
    }
    .chart-container {
      margin-bottom: 2rem;
      background: #fff;
      border-radius: .5rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      padding: 1rem;
    }
  </style>
</head>
<body>
<div class="container mt-4">
  <h1 class="mb-4 text-center">Albo d'Oro Fantacalcio</h1>
  
  <div class="chart-container">
    <h4 class="mb-3">Trofei vinti per squadra</h4>
    <div id="chartSquadre"></div>
  </div>

  <div class="chart-container">
    <h4 class="mb-3">Trofei vinti per utente</h4>
    <div id="chartUtenti"></div>
  </div>

  <div class="table-responsive mt-4">
    <table id="alboTable" class="table table-striped table-bordered table-hover align-middle">
      <thead class="table-dark">
        <tr>
          <th>Stagione</th>
          <th>Fantaleague</th>
          <th>Coppa Sgnacchera</th>
          <th>Supercoppa Sgnacchera</th>
          <th>Lo Stronzino d'Oro</th>
          <th>Chimpules</th>
        </tr>
      </thead>
      <tbody>
        <!-- Dati dinamici -->
      </tbody>
    </table>
  </div>
</div>

<script>
  // Carica il JSON (puoi hostarlo come file statico nella repo o inline)
  fetch('albo.json')
    .then(response => response.json())
    .then(data => {
      renderTable(data);
      renderCharts(data);
    })
    .catch(err => {
      document.getElementById('alboTable').insertAdjacentHTML('afterend',
        `<div class="alert alert-danger">Errore nel caricamento del file JSON: ${err}</div>`);
    });

  function renderTable(albo) {
    const tbody = document.querySelector('#alboTable tbody');
    tbody.innerHTML = '';
    albo.forEach(row => {
      tbody.innerHTML += `
      <tr>
        <td>${row.stagione}</td>
        <td>${row.fantaleague ?? '-'}</td>
        <td>${row.coppa_sgnacchera ?? '-'}</td>
        <td>${row.supercoppa_sgnacchera ?? '-'}</td>
        <td>${row.lo_stronzino_d_oro ?? '-'}</td>
        <td>${row.chimpules ?? '-'}</td>
      </tr>
    `;
    });
  }

  // Calcola il conteggio trofei per squadra e utente
  function renderCharts(albo) {
    // Squadre
    const squadreCount = {};
    const trofei = ['fantaleague', 'coppa_sgnacchera', 'supercoppa_sgnacchera', 'lo_stronzino_d_oro', 'chimpules'];
    albo.forEach(row => {
      trofei.forEach(trofeo => {
        const squadra = row[trofeo];
        if (squadra) {
          squadreCount[squadra] = (squadreCount[squadra] || 0) + 1;
        }
      });
    });

    // Chart squadre
    const squadre = Object.keys(squadreCount);
    const conteggi = Object.values(squadreCount);
    const optionsSquadre = {
      chart: { type: 'bar', height: 350 },
      series: [{ name: 'Trofei', data: conteggi }],
      xaxis: { categories: squadre },
      colors: ['#0d6efd'],
      plotOptions: { bar: { distributed: true } }
    };
    new ApexCharts(document.querySelector("#chartSquadre"), optionsSquadre).render();

    // Utenti (se vuoi mostrare per utente, valorizza i campi utenti nel JSON!)
    const utentiCount = {};
    albo.forEach(row => {
      trofei.forEach(trofeo => {
        const utente = row.utenti?.[trofeo];
        if (utente) {
          utentiCount[utente] = (utentiCount[utente] || 0) + 1;
        }
      });
    });
    // Se tutti i campi sono null, mostra solo un messaggio
    if (Object.keys(utentiCount).length > 0) {
      const utenti = Object.keys(utentiCount);
      const conteggiUtenti = Object.values(utentiCount);
      const optionsUtenti = {
        chart: { type: 'bar', height: 350 },
        series: [{ name: 'Trofei', data: conteggiUtenti }],
        xaxis: { categories: utenti },
        colors: ['#6610f2'],
        plotOptions: { bar: { distributed: true } }
      };
      new ApexCharts(document.querySelector("#chartUtenti"), optionsUtenti).render();
    } else {
      document.querySelector("#chartUtenti").innerHTML = `<div class="alert alert-info">I dati utente non sono disponibili nel JSON.</div>`;
    }
  }
</script>
</body>
</html>
