<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Albo d'Oro Fantacalcio Torre Boldone</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- ApexCharts CDN -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <style>
    body {
      background: #f8f9fa;
    }

    .chart-container {
      margin-bottom: 2rem;
      background: #fff;
      border-radius: .5rem;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      padding: 1rem;
    }
  </style>
</head>

<body>
  <div class="container mt-4">
    <h1 class="mb-4 text-center">Albo d'Oro Fantacalcio Torre Boldone</h1>

    <div class="chart-container">
      <h4 class="mb-3">Trofei vinti per squadra</h4>
      <div id="chartSquadre"></div>
    </div>

    <div class="chart-container">
      <h4 class="mb-3">Trofei vinti per utente</h4>
      <div id="chartUtenti"></div>
    </div>

    <div class="table-responsive mt-4">
      <table id="alboTable" class="table table-striped table-bordered table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>Stagione</th>
            <th>Fantaleague</th>
            <th>Coppa Sgnacchera</th>
            <th>Supercoppa Sgnacchera</th>
            <th>Lo Stronzino d'Oro</th>
            <th>Chimpules</th>
          </tr>
        </thead>
        <tbody>
          <!-- Dati dinamici -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // Carica il JSON (puoi hostarlo come file statico nella repo o inline)
    fetch('albo.json')
      .then(response => response.json())
      .then(data => {
        renderTable(data);
        renderCharts(data);
      })
      .catch(err => {
        document.getElementById('alboTable').insertAdjacentHTML('afterend',
          `<div class="alert alert-danger">Errore nel caricamento del file JSON: ${err}</div>`);
      });

    function renderTable(albo) {
      const tbody = document.querySelector('#alboTable tbody');
      tbody.innerHTML = '';
      albo.forEach(row => {
        tbody.innerHTML += `
      <tr>
        <td>${row.stagione}</td>
        <td>${row.fantaleague ?? '-'}</td>
        <td>${row.coppa_sgnacchera ?? '-'}</td>
        <td>${row.supercoppa_sgnacchera ?? '-'}</td>
        <td>${row.lo_stronzino_d_oro ?? '-'}</td>
        <td>${row.chimpules ?? '-'}</td>
      </tr>
    `;
      });
    }

    // Calcola il conteggio trofei per squadra e utente
    function renderCharts(albo) {
      // Squadre: conteggio trofei per squadra
      const squadreCount = {};
      const trofei = ['fantaleague', 'coppa_sgnacchera', 'supercoppa_sgnacchera', 'lo_stronzino_d_oro', 'chimpules'];
      albo.forEach(row => {
        trofei.forEach(trofeo => {
          const squadra = row[trofeo];
          if (squadra) {
            squadreCount[squadra] = (squadreCount[squadra] || 0) + 1;
          }
        });
      });

      // Ordina squadre dal più vincente al meno
      const squadreOrdinato = Object.entries(squadreCount)
        .sort((a, b) => b[1] - a[1]);
      const squadre = squadreOrdinato.map(([nome]) => nome);
      const conteggi = squadreOrdinato.map(([_, count]) => count);

      // Colori diversi per ogni squadra (puoi personalizzare la palette)
      const palette = [
        "#0d6efd", "#6610f2", "#6f42c1", "#d63384", "#dc3545",
        "#fd7e14", "#ffc107", "#198754", "#20c997", "#0dcaf0"
      ];
      const colorsSquadre = squadre.map((_, i) => palette[i % palette.length]);

      // Chart squadre con legenda cliccabile
      const optionsSquadre = {
        chart: {type: 'bar', height: 350, toolbar: {show: false}},
        series: [{name: 'Trofei', data: conteggi}],
        xaxis: {categories: squadre},
        colors: colorsSquadre,
        plotOptions: {bar: {distributed: true}},
        legend: {show: true, position: 'top', onItemClick: {toggleDataSeries: true}},
        tooltip: {enabled: true}
      };
      new ApexCharts(document.querySelector("#chartSquadre"), optionsSquadre).render();

      // Trofei per utente: una colonna per ogni tipologia di trofeo, raggruppati per utente
      const utentiSet = new Set();
      const utentiTrofei = {};
      albo.forEach(row => {
        trofei.forEach(trofeo => {
          const utente = row.utenti?.[trofeo];
          if (utente) {
            utentiSet.add(utente);
            if (!utentiTrofei[utente]) utentiTrofei[utente] = {fantaleague: 0, coppa_sgnacchera: 0, supercoppa_sgnacchera: 0, lo_stronzino_d_oro: 0, chimpules: 0};
            utentiTrofei[utente][trofeo]++;
          }
        });
      });

      const utenti = Array.from(utentiSet);
      if (utenti.length > 0) {
        // Serie: una per ogni trofeo, dati per ogni utente
        const serieUtenti = trofei.map((trofeo, idx) => ({
          name: trofeo.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
          data: utenti.map(u => utentiTrofei[u]?.[trofeo] || 0),
          color: palette[idx % palette.length]
        }));

        const optionsUtenti = {
          chart: {type: 'bar', height: 350, stacked: true},
          series: serieUtenti,
          xaxis: {categories: utenti},
          legend: {show: true, position: 'top', onItemClick: {toggleDataSeries: true}},
          tooltip: {enabled: true}
        };
        new ApexCharts(document.querySelector("#chartUtenti"), optionsUtenti).render();
      } else {
        document.querySelector("#chartUtenti").innerHTML = `<div class="alert alert-info">I dati utente non sono disponibili nel JSON.</div>`;
      }
    }
  </script>
</body>

</html>
